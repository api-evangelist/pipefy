aid: pipefy
name: Pipefy
description: >-
  Pipefy is a no-code business process and workflow automation platform that
  lets teams build, run, and orchestrate processes such as procurement, HR
  onboarding, customer onboarding, and IT service requests using customizable
  pipes, forms, and AI agents. The platform exposes a GraphQL API at
  api.pipefy.com/graphql for managing pipes, cards, phases, fields, users,
  organizations, webhooks, and AI-driven workflow integrations, with OAuth2
  Bearer token authentication via Personal Access Tokens or Service Accounts.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
