    name: Pipefy GraphQL API
    description: >-
      GraphQL API for managing pipes, cards, phases, fields, organizations,
      users, webhooks, and AI agents on the Pipefy workflow automation
      platform. Authentication is performed using an OAuth2 Bearer token
      (Personal Access Token or Service Account) in the Authorization header.
    humanURL: https://developers.pipefy.com/reference/the-graphql-endpoint
